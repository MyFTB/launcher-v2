version: 2

updates:
  # ── npm ────────────────────────────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Berlin"
    # Keep PR count manageable by grouping related packages
    groups:
      electron:
        patterns:
          - "electron"
          - "electron-*"
      react:
        patterns:
          - "react"
          - "react-*"
          - "@types/react*"
      vite:
        patterns:
          - "vite"
          - "vite-*"
          - "@vitejs/*"
          - "electron-vite"
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
      typescript-tooling:
        patterns:
          - "typescript"
          - "typescript-eslint"
          - "eslint"
          - "globals"
          - "@types/node"
      xmcl:
        patterns:
          - "@xmcl/*"
    open-pull-requests-limit: 10
    # Major version bumps require manual review — too much migration risk.
    # Minor and patch are safe to auto-PR. Handle majors by hand when ready.
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # ── GitHub Actions ────────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      github-actions:
        patterns:
          - "*"
    open-pull-requests-limit: 5
