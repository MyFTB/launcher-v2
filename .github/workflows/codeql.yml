# CodeQL security analysis
# Scans TypeScript/JavaScript for security vulnerabilities and code quality issues.
# Runs on every push to main, every PR, and weekly for historical scans.

name: CodeQL

on:
  push:
    branches: ["main"]
    paths:
      - "src/**"
      - "package.json"
  pull_request:
    branches: ["main"]
    paths:
      - "src/**"
  schedule:
    # Weekly scan every Monday at 07:00 UTC
    - cron: "0 7 * * 1"

jobs:
  analyze:
    name: Analyze (TypeScript)
    runs-on: ubuntu-latest

    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          # Use the default security-and-quality query suite
          queries: security-and-quality

      - name: Set up Node.js (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npx electron-vite build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"
