# Release workflow — triggered when a v* tag is pushed (e.g. v2.0.0).
# Each platform builds its signed installer in parallel, then a final job
# creates the GitHub Release and attaches all artifacts.
#
# Required repository secrets:
#
#   GH_TOKEN                    — GitHub token used by electron-builder to
#                                 upload artifacts to GitHub Releases.
#                                 Use the built-in github.token or a PAT with
#                                 contents:write + releases:write scopes.
#
#   Windows code signing (optional — build succeeds without these):
#   WIN_CSC_LINK                — Base64-encoded .pfx certificate, or a URL to
#                                 the certificate file.
#   WIN_CSC_KEY_PASSWORD        — Password for the Windows signing certificate.
#
#   macOS code signing (required for notarization):
#   CSC_LINK                    — Base64-encoded .p12 Developer ID certificate.
#   CSC_KEY_PASSWORD            — Password for the macOS .p12 certificate.
#   APPLE_ID                    — Apple ID email used for notarization.
#   APPLE_APP_SPECIFIC_PASSWORD — App-specific password generated at
#                                 appleid.apple.com for the APPLE_ID account.
#   APPLE_TEAM_ID               — 10-character Apple Developer Team ID.

name: Release

on:
  push:
    tags:
      - "v*"

# Only one release workflow should run at a time for a given tag.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# ── Shared inputs / outputs ──────────────────────────────────────────────────
# The tag name (e.g. "v2.0.0") is derived from github.ref_name and used as
# the release title / artifact directory.

# Opt into Node.js 24 for action runners (becomes default June 2026)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ============================================================================
  # Platform build jobs — run in parallel
  # ============================================================================

  # Determine the update channel once and share it across all build jobs.
  # Tags with a prerelease suffix (e.g. v2.0.0-alpha.1) publish to the
  # "experimental" channel so stable users are never offered these builds.
  resolve-channel:
    name: Resolve update channel
    runs-on: ubuntu-latest
    outputs:
      channel: ${{ steps.ch.outputs.channel }}
    steps:
      - name: Set channel
        id: ch
        run: |
          if [[ "${{ github.ref_name }}" == *-* ]]; then
            echo "channel=experimental" >> "$GITHUB_OUTPUT"
          else
            echo "channel=latest" >> "$GITHUB_OUTPUT"
          fi

  build-windows:
    name: Build — Windows
    runs-on: windows-latest
    needs: resolve-channel

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js (LTS)
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build (electron-vite)
        run: npx electron-vite build

      # electron-builder --win produces the NSIS x64 installer defined in
      # package.json under build.win.  --publish always uploads artifacts
      # directly to the draft GitHub Release created by the release job.
      - name: Package & publish — Windows
        run: npx electron-builder --win --publish always
        env:
          # GitHub Releases upload token
          GH_TOKEN: ${{ secrets.GH_TOKEN || github.token }}

          # Windows code signing — both must be set, or neither (unsigned build).
          # WIN_CSC_LINK accepts a base64-encoded .pfx or a file:// / https:// URL.
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

  # ----------------------------------------------------------------------------

  build-macos:
    name: Build — macOS
    runs-on: macos-latest
    needs: resolve-channel

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js (LTS)
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build (electron-vite)
        run: npx electron-vite build

      - name: Package & publish — macOS
        run: npx electron-builder --mac --publish always
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

  # ----------------------------------------------------------------------------

  build-linux:
    name: Build — Linux
    runs-on: ubuntu-latest
    needs: resolve-channel

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js (LTS)
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build (electron-vite)
        run: npx electron-vite build

      # electron-builder --linux produces AppImage and .deb packages as defined
      # in package.json under build.linux.
      - name: Package & publish — Linux
        run: npx electron-builder --linux --publish always
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || github.token }}

  # ============================================================================
  # Final release job — runs after all three platform builds succeed
  # ============================================================================

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - resolve-channel
      - build-windows
      - build-macos
      - build-linux
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # Use a token that can push back to main (GITHUB_TOKEN works for
          # repos without branch protection on main; use a PAT if needed).
          token: ${{ secrets.GH_TOKEN || github.token }}

      # Generate release notes for this tag only (no header, just the body)
      - name: Generate release notes
        id: cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: RELEASE_NOTES.md
          GITHUB_REPO: ${{ github.repository }}

      # Regenerate the full CHANGELOG.md and commit it back to main
      - name: Update CHANGELOG.md
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --output CHANGELOG.md
        env:
          GITHUB_REPO: ${{ github.repository }}

      - name: Commit CHANGELOG.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          # Only commit if there are actual changes
          git diff --staged --quiet && echo "No changes to CHANGELOG.md" && exit 0
          git commit -m "docs: update CHANGELOG.md for ${{ github.ref_name }} [skip ci]"
          git push origin HEAD:main

      # Publish the GitHub Release.
      # electron-builder's --publish always already created a draft release and
      # uploaded all platform artifacts to it.  We use `gh release edit` here
      # (instead of softprops/action-gh-release) so we update *that* existing
      # draft rather than accidentally creating a second release.
      - name: Publish GitHub Release
        run: |
          PRERELEASE_FLAG=""
          if [[ "${{ github.ref_name }}" == *-* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release edit "${{ github.ref_name }}" \
            --draft=false \
            --title "MyFTB Launcher ${{ github.ref_name }}" \
            --notes-file RELEASE_NOTES.md \
            $PRERELEASE_FLAG
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || github.token }}

